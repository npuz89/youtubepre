buildscript {
    ext.kotlin_version = '2.0.0'
    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath 'com.android.tools.build:gradle:8.1.0'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.buildDir = '../build'
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(':app')
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}

// ХАК ДЛЯ ИСПРАВЛЕНИЯ ОШИБКИ PROGUARD В СТОРОННИХ ПЛАГИНАХ
subprojects {
    afterEvaluate { project ->
        if (project.hasProperty('android')) {
            project.android.each { variant ->
                try {
                    // Автоматически заменяем устаревший файл во всех зависимостях на лету
                    if (project.plugins.hasPlugin('com.android.library')) {
                        project.android.buildTypes.each { buildType ->
                            buildType.proguardFiles.replaceAll { file ->
                                if (file.toString().contains('proguard-android.txt')) {
                                    return project.android.getDefaultProguardFile('proguard-android-optimize.txt')
                                }
                                return file
                            }
                        }
                    }
                } catch (Exception e) {
                    // Игнорируем ошибки, если у проекта нет таких настроек
                }
            }
        }
    }
}