name: youtube_background_player
description: YouTube клиент с фоновым воспроизведением
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  cupertino_icons: ^1.0.6
  youtube_explode_dart: ^2.3.1
  audio_service: ^0.18.13
  just_audio: ^0.9.36
  provider: ^6.1.1
  cached_network_image: ^3.3.1
  intl: ^0.18.1
  http: ^1.1.0
  path_provider: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/