name: youtube_background_player
description: YouTube клиент с фоновым воспроизведением
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Основные зависимости
  cupertino_icons: ^1.0.6
  youtube_explode_dart: ^3.1.0
  audio_service: ^0.18.13
  just_audio: ^0.9.36
  just_audio_background: ^0.0.14
  provider: ^6.0.5
  cached_network_image: ^3.3.0
  flutter_cache_manager: ^3.3.1
  url_launcher: ^6.2.0
  intl: ^0.18.1
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/