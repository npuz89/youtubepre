name: background_youtube
description: YouTube player with background playback support
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  webview_flutter: ^4.4.0
  media_kit: ^1.1.0
  media_kit_video: ^1.2.0
  shared_preferences: ^2.2.2
  connectivity_plus: ^5.0.1
  flutter_screenutil: ^5.9.0
  permission_handler: ^11.0.1
  wakelock_plus: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true