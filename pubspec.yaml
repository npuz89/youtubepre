name: youtube_background_player
description: YouTube клиент с фоновым воспроизведением
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Основные зависимости с актуальными версиями
  cupertino_icons: ^1.0.8
  youtube_explode_dart: ^2.3.1
  audio_service: ^0.18.13
  just_audio: ^0.9.37
  just_audio_background: ^0.0.13
  provider: ^6.1.2
  cached_network_image: ^3.4.0
  flutter_cache_manager: ^3.3.2
  url_launcher: ^6.3.0
  intl: ^0.19.0
  shimmer: ^3.0.0
  http: ^1.2.2
  path_provider: ^2.1.4
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/