name: Flutter Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Install dependencies
      run: flutter pub get

    # ХАК 1: Исправляем ошибку Proguard в кэше плагина WebView
     Cav- name: Patch flutter_inappwebview Proguard Error
      run: |
        sed -i "s/proguard-android.txt/proguard-android-optimize.txt/g" /home/runner/.pub-cache/hosted/pub.dev/flutter_inappwebview-5.8.0/android/build.gradle

    # ХАК 2: ЖЕСТКИЙ ПАТЧ САМОГО FLUTTER SDK (Вырезаем ломающиеся filePermissions)
    - name: Patch Flutter SDK Core Bug
      run: |
        FLUTTER_PLUGIN_FILE="/opt/hostedtoolcache/flutter/stable-3.44.3-x64/flutter/packages/flutter_tools/gradle/src/main/kotlin/FlutterPlugin.kt"
        if [ -f "$FLUTTER_PLUGIN_FILE" ]; then
          echo "Файл найден, применяем патч..."
          # Закомментируем строки 754-757, которые вызывают ошибку компиляции Kotlin
          sed -i '754,757s/^/\/\/ /' "$FLUTTER_PLUGIN_FILE"
        else
          echo "Файл не найден по стандартному пути, ищем динамически..."
          # На случай, если путь к SDK немного изменится
          TARGET_FILE=$(find /opt/hostedtoolcache/flutter -name "FlutterPlugin.kt" | head -n 1)
          if [ -not -z "$TARGET_FILE" ]; then
            sed -i '754,757s/^/\/\/ /' "$TARGET_FILE"
          fi
        fi

    - name: Build APK
      run: flutter build apk --debug --android-skip-build-dependency-validation