name: Flutter Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        flutter-version: '3.24.3'

    - name: Install dependencies
      run: flutter pub get

    # Исправляем ошибку Proguard в кэше плагина WebView
    - name: Patch flutter_inappwebview Proguard Error
      run: |
        sed -i "s/proguard-android.txt/proguard-android-optimize.txt/g" /home/runner/.pub-cache/hosted/pub.dev/flutter_inappwebview-5.8.0/android/build.gradle

    - name: Build APK
      run: flutter build apk --debug --android-skip-build-dependency-validation
      env:
        # Принудительно выделяем память для компилятора Java на сервере
        _JAVA_OPTIONS: "-Xmx4g"
        GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.workers.max=2"