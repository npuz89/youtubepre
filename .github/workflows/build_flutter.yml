name: Flutter Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Install dependencies
      run: flutter pub get

    - name: Patch flutter_inappwebview Proguard Error
      run: |
        # Исправляем ошибку Proguard в кэше плагина
        sed -i "s/proguard-android.txt/proguard-android-optimize.txt/g" /home/runner/.pub-cache/hosted/pub.dev/flutter_inappwebview-5.8.0/android/build.gradle

    - name: Build APK
      # Флаг -PkotlinVersion принудительно выставляет версию для всей сборки
      run: flutter build apk --debug --android-skip-build-dependency-validation -PkotlinVersion=1.9.24
      env:
        # Этот флаг запрещает Flutter переписывать наши файлы build.gradle
        FLUTTER_SUPPRESS_ANALYTICS: "true"